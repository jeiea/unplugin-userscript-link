[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/), and this project
adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
body = """
{% macro print_commit(commit) -%}
    - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
        {{ commit.message | upper_first }} \
        (`{{ commit.id | truncate(length=7, end="") }}`)\
{% endmacro -%}

{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim }}
    {% for commit in commits %}
        {{ self::print_commit(commit=commit) }}
    {%- endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Added" },
  { message = "^fix", group = "<!-- 1 -->Fixed" },
  { message = "^refactor", group = "<!-- 2 -->Changed" },
  { message = "^perf", group = "<!-- 2 -->Changed" },
  { message = "^revert", group = "<!-- 2 -->Changed" },
  { message = "^docs", group = "<!-- 3 -->Documentation" },
  { message = "^build", skip = true },
  { message = "^ci", skip = true },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
]
protect_breaking_commits = true
filter_commits = true
tag_pattern = '^v[0-9]+\.[0-9]+\.[0-9]+(?:[-+].*)?$'
sort_commits = "oldest"
